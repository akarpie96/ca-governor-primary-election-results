name: Update Election Results

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python election.py

      - name: Generate county map
        run: python map_ca_governor.py

      - name: Commit updated map
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ca_governor_county_map.html
          git commit -m "Update CA governor county map" || echo "No map changes to commit"
          git push